function _assign(target,source){

function formatBeijingTime(ts){
    var d=new Date(ts||Date.now());
    var offset=d.getTimezoneOffset();
    var bjTime=new Date(d.getTime()-offset*60000+8*3600000);
    var pad=function(n){return String(n).padStart(2,'0')};
    return bjTime.getFullYear()+'-'+pad(bjTime.getMonth()+1)+'-'+pad(bjTime.getDate())+' '+pad(bjTime.getHours())+':'+pad(bjTime.getMinutes())+':'+pad(bjTime.getSeconds());
}

function _applyServerDate(dateStr){
    if(!dateStr)return false;
    try{
        var t=new Date(dateStr).getTime();
        if(!isNaN(t)&&t>1600000000000){_networkTime=t;_networkTimeFetched=Date.now();return true}
    }catch(e){}
    return false;
}

async function getNetworkTime(){
    var now=Date.now();
    if(_networkTime&&now-_networkTimeFetched<300000)return _networkTime+(now-_networkTimeFetched);
    var tryUrls=[
        'https://worldtimeapi.org/api/timezone/Etc/UTC',
        'https://timeapi.io/api/time/current/zone?timeZone=UTC',
        'https://timeapi.io/api/Time/current/zone?timeZone=UTC'
    ];
    for(var i=0;i<tryUrls.length;i++){
        try{
            var ctrl=new AbortController();
            var tid=setTimeout(function(){ctrl.abort()},4000);
            var res=await fetch(tryUrls[i],{signal:ctrl.signal});
            clearTimeout(tid);
            var dateHeader=res.headers.get('Date');
            if(dateHeader&&_applyServerDate(dateHeader))return _networkTime+(Date.now()-_networkTimeFetched);
            var data=await res.json();
            var timeField=data.utc_datetime||data.dateTime||data.datetime;
            if(timeField&&_applyServerDate(timeField+'Z'))return _networkTime+(Date.now()-_networkTimeFetched);
            if(data.unixtime){
                _networkTime=data.unixtime*1000;_networkTimeFetched=Date.now();
                return _networkTime+(Date.now()-_networkTimeFetched);
            }
        }catch(e){}
    }
    return Date.now();
}

async function callCloudAPI(action,params){
    var config=getSyncConfig();
    if(!config.enabled)return{status:'error',message:'云同步未启用',isNetworkError:false};
    var payload={webhookUrl:config.webhookUrl,message:{Context:{argv:{表格名:config.sheetName,操作:action}}}};
    if(params){
        for(var k in params){if(params.hasOwnProperty(k))payload.message.Context.argv[k]=params[k]}
    }
    var headers={'Content-Type':'application/json'};
    if(config.token)headers['AirScript-Token']=config.token;
    var allUrls=PRIMARY_API_URLS.concat(FALLBACK_API_URLS);
    var maxRetries=config.retryCount||5;
    var retryInterval=config.retryInterval||2;
    var fetchTimeout=30000;
    for(var u=0;u<allUrls.length;u++){
        var apiUrl=allUrls[u];
        var lastError=null;
        var lastIsNetworkError=true;
        for(var attempt=0;attempt<maxRetries;attempt++){
            try{
                var ctrl=new AbortController();
                var tid=setTimeout(function(){ctrl.abort()},fetchTimeout);
                var response=await fetch(apiUrl,{method:'POST',headers:headers,body:JSON.stringify(payload),signal:ctrl.signal});
                clearTimeout(tid);
                if(!response.ok)throw new Error('HTTP '+response.status);
                var dateHeader=response.headers.get('Date');
                if(dateHeader)_applyServerDate(dateHeader);
                var result=await response.json();
                var r=result.data&&result.data.result?result.data.result:result;
                if(r.status==='success')return r;
                if(r.tongzhi){
                    var netKeywords=['网络','超时','timeout','ECONNRESET','ENOTFOUND','fetch','Failed to fetch','NetworkError','Network request'];
                    var isNet=false;
                    for(var ni=0;ni<netKeywords.length;ni++){if(r.tongzhi.indexOf(netKeywords[ni])!==-1){isNet=true;break}}
                    if(!isNet)return _assign(r,{isNetworkError:false});
                    lastError=new Error(r.tongzhi);lastIsNetworkError=true;
                }else{
                    lastError=new Error(r.message||JSON.stringify(r).slice(0,100)||'未知错误');lastIsNetworkError=true;
                }
            }catch(error){
                if(error.name==='AbortError')lastError=new Error('请求超时('+fetchTimeout/1000+'秒)');
                else lastError=error;
                lastIsNetworkError=true;
            }
            if(attempt<maxRetries-1)await new Promise(function(r){setTimeout(r,retryInterval*1000)});
        }
    }
    return{status:'error',message:lastError?lastError.message:'所有云函数地址均不可用',isNetworkError:lastIsNetworkError};
}

async function findFileInCloudById(fileId){
    if(!fileId)return{file:null,networkOk:false};
    var result=await callCloudAPI('查找',{列名:'ID',关键字:fileId});
    if(result.status==='success'){

        return{file:null,networkOk:true};
    }
    if(result.isNetworkError)return{file:null,networkOk:false};
    return{file:null,networkOk:true};
}

function enqueueSync(fn,label){
    return new Promise(function(resolve,reject){
        var existing=-1;
        for(var i=0;i<syncQueue.length;i++){if(syncQueue[i].label===label){existing=i;break}}
        if(existing!==-1){syncQueue[existing].fn=fn;syncQueue[existing].resolve=resolve;syncQueue[existing].reject=reject}
        else syncQueue.push({fn:fn,label:label,resolve:resolve,reject:reject});
        processSyncQueue();
    });
}

function processSyncQueue(){
    if(syncMutex||syncQueue.length===0)return;
    syncMutex=true;
    var task=syncQueue.shift();
    task.fn().then(task.resolve).catch(task.reject).finally(function(){syncMutex=false;processSyncQueue()});
}

async function ensureSystemFileInCloud(sysFile){
    var meta=getSystemFileMeta(sysFile.dataType);
    if(!meta){
        meta={id:sysFile.id,name:sysFile.name,version:0,lastSyncVersion:0};
        setSystemFileMeta(sysFile.dataType,meta);
    }
    var cloudResult=await findFileInCloudById(meta.id);
    if(!cloudResult.networkOk){
        console.log('[Sync] 网络异常，无法检查系统文件:',sysFile.name);
        return{status:'network_error'};
    }
    if(!cloudResult.file){
        var localData;
        if(sysFile.dataType==='students')localData=readLocalStudents();
        else if(sysFile.dataType==='records')localData=readLocalRecords();
        else if(sysFile.dataType==='levels')localData=readLocalLevels();
        else localData=[];

        var content=JSON.stringify(localData);
        var netTime=await getNetworkTime();
        var newRow=await findFirstEmptyRow();
        var writeResult=await callCloudAPI('批量写入',{
            行号:newRow,
            数据:{ID:meta.id,文件名:sysFile.name,内容:content,版本号:'1',文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime)}
        });
        if(writeResult.status==='success'){
            meta.version=1;
            meta.lastSyncVersion=1;
            setSystemFileMeta(sysFile.dataType,meta);
            console.log('[Sync] 首次上传系统文件:',sysFile.name,'v1');
            return{status:'uploaded',version:1};
        }else{
            console.log('[Sync] 首次上传系统文件失败:',sysFile.name);
            return{status:'error'};
        }
    }
    return{status:'exists',cloudFile:cloudResult.file};
}

async function syncSystemFile(sysFile){
    var meta=getSystemFileMeta(sysFile.dataType);
    if(!meta){
        meta={id:sysFile.id,name:sysFile.name,version:0,lastSyncVersion:0};
        setSystemFileMeta(sysFile.dataType,meta);
    }

    var localData;
    if(sysFile.dataType==='students')localData=readLocalStudents();
    else if(sysFile.dataType==='records')localData=readLocalRecords();
    else if(sysFile.dataType==='levels')localData=readLocalLevels();
    else localData=[];

    var localVer=meta.version||0;
    var localContent=JSON.stringify(localData);

    var cloudResult=await findFileInCloudById(meta.id);
    if(!cloudResult.networkOk){
        console.log('[Sync] 网络异常，跳过系统文件同步:',sysFile.name);
        isOnline=false;
        return;
    }
    isOnline=true;

    if(!cloudResult.file){
        var netTime=await getNetworkTime();
        var newRow=await findFirstEmptyRow();
        var newVersion=Math.max(localVer,1);
        if(localVer===0)newVersion=1;
        var writeResult=await callCloudAPI('批量写入',{
            行号:newRow,
            数据:{ID:meta.id,文件名:sysFile.name,内容:localContent,版本号:newVersion.toString(),文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime)}
        });
        if(writeResult.status==='success'){
            meta.version=newVersion;
            meta.lastSyncVersion=newVersion;
            setSystemFileMeta(sysFile.dataType,meta);
            console.log('[Sync] 上传系统文件到云端:',sysFile.name,'v'+newVersion);
        }
        return;
    }

    var cloudFile=cloudResult.file;
    var cloudVer=parseInt(cloudFile.版本号||'0');
    var cloudContent=cloudFile.内容||'';

    if(cloudVer>localVer){
        try{
            var cloudData=JSON.parse(cloudContent);
            if(sysFile.dataType==='students'){
                writeLocalStudents(cloudData);
                notifyParent('dataUpdated',{dataType:'students',data:cloudData,version:cloudVer});
            }else if(sysFile.dataType==='records'){
                writeLocalRecords(cloudData);
                notifyParent('dataUpdated',{dataType:'records',data:cloudData,version:cloudVer});
            }else if(sysFile.dataType==='levels'){
                writeLocalLevels(cloudData);
                notifyParent('dataUpdated',{dataType:'levels',data:cloudData,version:cloudVer});
            }
            meta.version=cloudVer;
            meta.lastSyncVersion=cloudVer;
            setSystemFileMeta(sysFile.dataType,meta);
            console.log('[Sync] 下载云端系统文件:',sysFile.name,'v'+cloudVer);
        }catch(e){
            console.log('[Sync] 解析云端数据失败:',sysFile.name,e);
        }
    }else if(localVer>cloudVer){
        var netTime2=await getNetworkTime();
        var writeResult2=await callCloudAPI('批量写入',{
            行号:cloudFile._行号,
            数据:{ID:meta.id,文件名:sysFile.name,内容:localContent,版本号:localVer.toString(),文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime2)}
        });
        if(writeResult2.status==='success'){
            meta.lastSyncVersion=localVer;
            setSystemFileMeta(sysFile.dataType,meta);
            console.log('[Sync] 上传本地系统文件:',sysFile.name,'v'+localVer);
        }
    }else{
        console.log('[Sync] 系统文件已是最新:',sysFile.name,'v'+localVer);
    }
}

async function syncBankFile(bank,meta){
    var localContent=JSON.stringify(bank);
    var localVer=meta.version||0;

    var cloudResult=await findFileInCloudById(meta.id);
    if(!cloudResult.networkOk){
        console.log('[Sync] 网络异常，跳过题库同步:',bank.name);
        isOnline=false;
        return;
    }
    isOnline=true;

    if(!cloudResult.file){
        var netTime=await getNetworkTime();
        var newRow=await findFirstEmptyRow();
        var newVersion=Math.max(localVer,1);
        if(localVer===0)newVersion=1;
        var writeResult=await callCloudAPI('批量写入',{
            行号:newRow,
            数据:{ID:meta.id,文件名:bank.name,内容:localContent,版本号:newVersion.toString(),文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime)}
        });
        if(writeResult.status==='success'){
            meta.version=newVersion;
            meta.lastSyncVersion=newVersion;
            setBankMeta(bank.id||bank.name,meta);
            if(bank._newFile){
                var banks=readLocalBanks();
                for(var ni=0;ni<banks.length;ni++){if(banks[ni].id===bank.id){delete banks[ni]._newFile;break}}
                writeLocalBanks(banks);
            }
            console.log('[Sync] 上传题库到云端:',bank.name,'v'+newVersion);
        }
        return;
    }

    var cloudFile=cloudResult.file;
    var cloudVer=parseInt(cloudFile.版本号||'0');
    var cloudContent=cloudFile.内容||'';

    if(cloudVer>localVer){
        try{
            var cloudData=JSON.parse(cloudContent);
            var banks=readLocalBanks();
            var found=false;
            for(var i=0;i<banks.length;i++){
                if(banks[i].id===bank.id||(banks[i].name===bank.name)){
                    banks[i]=_assign(banks[i],cloudData);
                    found=true;break;
                }
            }
            if(!found){
                banks.push(cloudData);
            }
            writeLocalBanks(banks);
            notifyParent('dataUpdated',{dataType:'banks',data:banks,bankId:bank.id||bank.name,version:cloudVer});
            meta.version=cloudVer;
            meta.lastSyncVersion=cloudVer;
            setBankMeta(bank.id||bank.name,meta);
            console.log('[Sync] 下载云端题库:',bank.name,'v'+cloudVer);
        }catch(e){
            console.log('[Sync] 解析云端题库数据失败:',bank.name,e);
        }
    }else if(localVer>cloudVer){
        var netTime2=await getNetworkTime();
        var writeResult2=await callCloudAPI('批量写入',{
            行号:cloudFile._行号,
            数据:{ID:meta.id,文件名:bank.name,内容:localContent,版本号:localVer.toString(),文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime2)}
        });
        if(writeResult2.status==='success'){
            meta.lastSyncVersion=localVer;
            setBankMeta(bank.id||bank.name,meta);
            if(bank._newFile){
                var banks2=readLocalBanks();
                for(var ni2=0;ni2<banks2.length;ni2++){if(banks2[ni2].id===bank.id){delete banks2[ni2]._newFile;break}}
                writeLocalBanks(banks2);
            }
            console.log('[Sync] 上传本地题库:',bank.name,'v'+localVer);
        }
    }else{
        console.log('[Sync] 题库已是最新:',bank.name,'v'+localVer);
    }
}

async function syncAllBanks(){
    var banks=readLocalBanks();
    var allMetas=getAllBankMetas();

    for(var i=0;i<banks.length;i++){
        var bank=banks[i];
        var bankKey=bank.id||bank.name;
        if(bank.id&&bank.id.indexOf('demo_')===0)continue;
        if(!allMetas[bankKey]){
            allMetas[bankKey]={id:'QB_'+genFileId(),name:bank.name,version:0,lastSyncVersion:0};
            setBankMeta(bankKey,allMetas[bankKey]);
        }
        var meta=allMetas[bankKey];
        await syncBankFile(bank,meta);
    }

    var cloudResult=await callCloudAPI('读取全部');
    if(cloudResult.status==='success'&&cloudResult.数据){
        var cloudFiles=cloudResult.数据;
        var localBankIds={};
        for(var j=0;j<banks.length;j++){localBankIds[banks[j].id||banks[j].name]=true}
        var allMetasCheck=getAllBankMetas();
        var cloudBankIdSet={};
        for(var mKey in allMetasCheck){if(allMetasCheck[mKey]&&allMetasCheck[mKey].id)cloudBankIdSet[allMetasCheck[mKey].id]=true}
        for(var k=0;k<cloudFiles.length;k++){
            var cf=cloudFiles[k];
            if(!cf.ID||!cf.ID.trim())continue;
            if(cf.ID.indexOf('QB_')!==0)continue;
            if(!cf.文件名||!cf.文件名.trim())continue;
            var bankId=cf.ID;
            if(cloudBankIdSet[bankId])continue;

            try{
                var cloudData=JSON.parse(cf.内容||'{}');
                var currentBanks=readLocalBanks();
                currentBanks.push(cloudData);
                writeLocalBanks(currentBanks);
                var newBankKey=cloudData.id||cloudData.name||bankId;
                var newMeta={id:bankId,name:cf.文件名,version:parseInt(cf.版本号||'0'),lastSyncVersion:parseInt(cf.版本号||'0')};
                setBankMeta(newBankKey,newMeta);
                notifyParent('dataUpdated',{dataType:'banks',data:currentBanks,bankId:bankId,version:newMeta.version});
                console.log('[Sync] 从云端下载新题库:',cf.文件名);
            }catch(e){
                console.log('[Sync] 解析云端题库失败:',cf.文件名,e);
            }
        }

        var cloudBankIds={};
        for(var ci=0;ci<cloudFiles.length;ci++){if(cloudFiles[ci].ID&&cloudFiles[ci].ID.indexOf('QB_')===0)cloudBankIds[cloudFiles[ci].ID]=true}
        var localBanks=readLocalBanks();
        var changed=false;
        var surviving=[];
        for(var li=0;li<localBanks.length;li++){
            var lb=localBanks[li];
            if(lb.id&&lb.id.indexOf('demo_')===0){surviving.push(lb);continue}
            var lbKey=lb.id||lb.name;
            var lbMeta=allMetas[lbKey];
            if(lb._newFile){surviving.push(lb);continue}
            if(!lbMeta){surviving.push(lb);continue}
            if(cloudBankIds[lbMeta.id]){surviving.push(lb);continue}
            changed=true;
            console.log('[Sync] 删除本地题库（云端不存在）:',lb.name);
        }
        if(changed){
            writeLocalBanks(surviving);
            notifyParent('dataUpdated',{dataType:'banks',data:surviving});
        }
    }
}

async function fullSync(){
    var config=getSyncConfig();
    if(!config.enabled)return;

    notifyParent('syncStatus',{status:'syncing',detail:'全量同步中'});

    await enqueueSync(async function(){
        try{
            await initSyncSheet();

            for(var i=0;i<SYSTEM_FILES.length;i++){
                var checkResult=await ensureSystemFileInCloud(SYSTEM_FILES[i]);
                if(checkResult.status==='network_error'){
                    isOnline=false;
                    notifyParent('syncStatus',{status:'error',detail:'网络异常'});
                    return;
                }
            }

            for(var j=0;j<SYSTEM_FILES.length;j++){
                await syncSystemFile(SYSTEM_FILES[j]);
            }

            await syncAllBanks();

            setLastSyncTimeVal(Date.now());
            firstSyncDone=true;
            isOnline=true;
            notifyParent('syncStatus',{status:'idle',detail:'同步完成'});
            console.log('[Sync] 全量同步完成');
        }catch(e){
            console.log('[Sync] 全量同步异常:',e);
            notifyParent('syncStatus',{status:'error',detail:e.message});
        }
    },'全量同步');
}

async function uploadDataChange(dataType,data){

        var meta=getSystemFileMeta('students');
        if(!meta){meta={id:SYSTEM_FILE_STUDENT_INFO.id,name:SYSTEM_FILE_STUDENT_INFO.name,version:0,lastSyncVersion:0};setSystemFileMeta('students',meta)}
        meta.version=(meta.version||0)+1;
        setSystemFileMeta('students',meta);
        await enqueueSync(async function(){
            var cloudResult=await findFileInCloudById(meta.id);
            if(!cloudResult.networkOk){isOnline=false;return}
            isOnline=true;
            var netTime=await getNetworkTime();
            if(cloudResult.file){
                var cloudVer=parseInt(cloudResult.file.版本号||'0');
                if(cloudVer>meta.version){
                    try{
                        var cloudData=JSON.parse(cloudResult.file.内容||'[]');
                        writeLocalStudents(cloudData);
                        meta.version=cloudVer;
                        meta.lastSyncVersion=cloudVer;
                        setSystemFileMeta('students',meta);
                        notifyParent('dataUpdated',{dataType:'students',data:cloudData,version:cloudVer});
                    }catch(e){}
                    return;
                }
                await callCloudAPI('批量写入',{
                    行号:cloudResult.file._行号,
                    数据:{ID:meta.id,文件名:meta.name,内容:content,版本号:meta.version.toString(),文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime)}
                });
            }else{
                var newRow=await findFirstEmptyRow();
                await callCloudAPI('批量写入',{
                    行号:newRow,
                    数据:{ID:meta.id,文件名:meta.name,内容:content,版本号:meta.version.toString(),文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime)}

            }
            meta.lastSyncVersion=meta.version;
            setSystemFileMeta('students',meta);
            setLastSyncTimeVal(Date.now());
            console.log('[Sync] 上传学生信息 v'+meta.version);

    }else if(dataType==='records'){

                        meta2.lastSyncVersion=cloudVer2;

                    }catch(e){}
                    return;
                }
                await callCloudAPI('批量写入',{
                    行号:cloudResult.file._行号,
                    数据:{ID:meta2.id,文件名:meta2.name,内容:content,版本号:meta2.version.toString(),文件夹路径:'',最后上传发起时间:formatBeijingTime(netTime)}

            var cloudResult=await findFileInCloudById(meta3.id);

            var bankKey=bank.id||bank.name;
            if(bank.id&&bank.id.indexOf('demo_')===0)continue;
            if(!allMetas[bankKey]){

function startAutoSync(){
    stopAutoSync();
    var config=getSyncConfig();
    if(!config.enabled)return;
    autoSyncCheckTimer=setInterval(function(){
        checkAutoSyncTriggers();
    },5000);
}

function stopAutoSync(){
    if(autoSyncCheckTimer){clearInterval(autoSyncCheckTimer);autoSyncCheckTimer=null}
    if(autoSyncTimer){clearTimeout(autoSyncTimer);autoSyncTimer=null}
}

function checkAutoSyncTriggers(){
    var config=getSyncConfig();
    if(!config.enabled)return;
    if(syncMutex)return;
    var now=Date.now();
    var deltaIntervalMs=(config.syncDeltaInterval||5)*1000;
    if(now-lastDeltaSyncTime<deltaIntervalMs)return;

    var lastAny=getLastSyncTime();
    var checkIntervalMs=(config.cloudCheckInterval||5)*60*1000;
    if(lastAny>0&&now-lastAny>=checkIntervalMs){
        lastDeltaSyncTime=now;
        fullSync();
    }
}

function debounceUpload(dataType,data,delay){
    if(debounceTimers[dataType]){clearTimeout(debounceTimers[dataType])}
    debounceTimers[dataType]=setTimeout(function(){
        uploadDataChange(dataType,data);
        delete debounceTimers[dataType];
    },delay||3000);
}

window.addEventListener('message',function(e){
    var data=e.data;
    if(!data||!data.type)return;
    if(data.target&&data.target!=='examSync')return;

    switch(data.type){
        case 'init':
            notifyParent('syncConfig',{config:getSyncConfig()});
            (async function(){
                console.log('[Sync] 收到初始化指令');
                await fullSync();
                startAutoSync();
            })();
            break;

        case 'dataChanged':
            if(data.dataType&&data.data){
                debounceUpload(data.dataType,data.data,data.debounce||3000);
            }
            break;

        case 'syncNow':
            (async function(){
                await fullSync();
            })();
            break;

        case 'getConfig':
            notifyParent('syncConfig',{config:getSyncConfig()});
            break;

        case 'updateConfig':
            if(data.config){
                var newConfig=_assign(getSyncConfig(),data.config);
                newConfig.sheetName='抽奖考试';
                saveSyncConfig(newConfig);
                startAutoSync();
                notifyParent('syncConfig',{config:newConfig});
            }
            break;

        case 'deleteBank':
            if(data.bankKey){
                (async function(bankKey){
                    var meta=getBankMeta(bankKey);
                    if(!meta)return;
                    var cloudResult=await findFileInCloudById(meta.id);
                    if(cloudResult.networkOk&&cloudResult.file&&cloudResult.file._行号){
                        await callCloudAPI('批量写入',{
                            行号:cloudResult.file._行号,
                            数据:{ID:'',文件名:'',内容:'',版本号:'',文件夹路径:'',最后上传发起时间:''}
                        });
                        console.log('[Sync] 已从云端删除题库:',meta.name);
                    }
                    var allMetas=getAllBankMetas();
                    delete allMetas[bankKey];
                    try{localStorage.setItem('exam_sync_bank_meta',JSON.stringify(allMetas))}catch(e){}
                })(data.bankKey);
            }
            break;

        case 'mainReady':
            startAutoSync();
            break;

        case 'mainActivated':
            if(firstSyncDone){
                fullSync();
            }
            break;

        case 'getSyncStatus':
            notifyParent('syncStatusReport',{
                enabled:getSyncConfig().enabled,
                isOnline:isOnline,
                firstSyncDone:firstSyncDone,
                lastSyncTime:getLastSyncTime(),
                syncing:syncMutex
            });
            break;

        case 'ping':
            notifyParent('syncReady',{});
            break;
    }
});

notifyParent('syncReady',{});

})();
